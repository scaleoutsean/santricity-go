apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "santricity-csi.fullname" . }}-node
  labels:
    {{- include "santricity-csi.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "santricity-csi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "santricity-csi.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.nodeName }}
      hostNetwork: true # Required for iSCSI/NVMe connectivity
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: csi-driver
          securityContext:
            privileged: true
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--nodeid=$(NODE_ID)"
            - "--controller=false"
            - "--node=true"
            - "--metrics-port=8081"
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # ISCSI Session Reaper (disabled by default)
            - name: SANTRICITY_ENABLE_REAPER
              value: "{{ .Values.node.enableReaper }}"
          volumeMounts:
            - name: kubelet-dir
              mountPath: {{ .Values.node.kubeletDir }}
              mountPropagation: "Bidirectional"
            - name: plugin-dir
              mountPath: /csi
            - name: device-dir
              mountPath: /dev
            - name: iscsi-dir
              mountPath: /etc/iscsi
              readOnly: true
            - name: nvme-dir
              mountPath: /etc/nvme
              readOnly: true
            - name: sys-dir
              mountPath: /sys
              readOnly: true
            - name: run-lock-dir
              mountPath: /run/lock
        - name: csi-node-driver-registrar
          image: "{{ .Values.sidecars.registrar.image }}"
          args:
            - "--csi-address=$(ADDRESS)"
            - "--kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: {{ .Values.node.kubeletDir }}/plugins/santricity.scaleoutsean.github.io/csi.sock
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
      volumes:
        - name: kubelet-dir
          hostPath:
            # Standard: /var/lib/kubelet
            path: {{ .Values.node.kubeletDir }}
            type: Directory
        - name: plugin-dir
          hostPath:
            # Adjust prefix matching kubelet-dir above
            path: {{ .Values.node.kubeletDir }}/plugins/santricity.scaleoutsean.github.io/
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            # Adjust prefix matching kubelet-dir above
            path: {{ .Values.node.kubeletDir }}/plugins_registry/
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
        - name: iscsi-dir
          hostPath:
            path: /etc/iscsi
            type: DirectoryOrCreate
        - name: nvme-dir
          hostPath:
            path: /etc/nvme
            type: DirectoryOrCreate
        - name: sys-dir
          hostPath:
            path: /sys
            type: Directory
        - name: run-lock-dir
          hostPath:
            path: /run/lock
            type: DirectoryOrCreate