name: Build and Publish CSI Driver

on:
  push:
    branches: [ "master" ]
    paths:
      - 'csi/**'
      - '.github/workflows/docker-publish.yml'
    # Publish semver tags as releases.
    # Matches both csi-v0.1.5 (standard) and csi-0.1.5 (no-v)
    tags: 
      - 'csi-v*.*.*'
      - 'csi-*.*.*'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'csi/**'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io
  # This will use the repository name (e.g. scaleoutsean/santricity-go) as the image name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login to GHCR. 
      # Note: This uses the automatic GITHUB_TOKEN for authentication within the action.
      # You don't need to manually configure secrets for this to work.
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            # Ensure the specific csi- tag (e.g. csi-v0.1.0) is used as the image tag
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=short

      # Build and push Docker image
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: csi/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Bump Helm Chart version automatically when a tag is pushed
      - name: Bump and push Helm Chart version
        if: startsWith(github.ref, 'refs/tags/csi-')
        run: |
          # Extract version from tag (e.g. csi-v1.0.0-beta.3 -> 1.0.0-beta.3, or csi-1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/csi-}
          VERSION=${VERSION#v}
          
          # Update version and appVersion in Chart.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" charts/santricity-csi/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"csi-$VERSION\"/" charts/santricity-csi/Chart.yaml
          
          # Comment out or update the manually hardcoded tag in values.yaml to rely on Chart.yaml appVersion
          sed -i -E 's/^(\s*tag:).*/\1 ""/' charts/santricity-csi/values.yaml
          
          # Commit and push back to master
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/santricity-csi/Chart.yaml charts/santricity-csi/values.yaml
          git commit -m "chore: bump Helm chart version to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin HEAD:master
