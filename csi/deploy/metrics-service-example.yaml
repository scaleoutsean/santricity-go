apiVersion: v1
kind: Service
metadata:
  name: santricity-csi-metrics
  namespace: santricity-csi
  labels:
    app: santricity-csi-controller
spec:
  selector:
    app: santricity-csi-controller
  type: NodePort # Use NodePort for external access without Ingress
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      nodePort: 32080 # Optional: specific static port (range 30000-32767)
